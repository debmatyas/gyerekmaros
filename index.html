<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>QR kód generátor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>❗❗Ezen az oldalon generált QR-kódok nem maradnak meg a készülékén, kérjük, hogy ne frissítse az oldalt a QR-kódok beolvasásáig!❗❗</h1>
<h1>❗❗Az oldal frissítése esetén a kitöltött adatok és a QR-kódok elvesznek❗❗</h1>
    <h2>Kísérő adatai</h2>

    <div class="row">
        <div>
            <label>Vezetéknév *</label>
            <input id="parentLast" type="text">
        </div>
        <div>
            <label>Keresztnév *</label>
            <input id="parentFirst" type="text">
        </div>
    </div>

    <label>Email cím *</label>
    <input id="parentEmail" type="email">

    <div class="row">
        <div>
            <label>Országkód *</label>
            <input id="phoneCountry" type="text" placeholder="+36">
        </div>
        <div>
            <label>Szolgáltató *</label>
            <input id="phoneProvider" type="text" placeholder="20/30/70">
        </div>
        <div>
            <label>Telefonszám *</label>
            <input id="phoneNumber" type="text" placeholder="1234567">
        </div>
    </div>

    <label>Település *</label>
    <input id="city" type="text">

    <h2>Gyerek lista</h2>

    <div id="children"></div>

    <button type="button" onclick="addChild()">+ További gyerek hozzáadása</button>

    <br><br>
    <button type="button" onclick="generateQRCodes()">Elküld</button>

    <div id="qrViewer" style="display:none;">
        <div id="qrContent"></div>

        <div id="navButtons">
            <button type="button" onclick="prevQR()">⬅️</button>
            <button type="button" onclick="nextQR()">➡️</button>
        </div>

        <div id="counter"></div>
    </div>

    <script>
        let qrList = [];
        let currentIndex = 0;

        function addChild(name = "", age = "", leave = "Mise előtt", note = "") {
            const container = document.getElementById("children");

            const div = document.createElement("div");
            div.className = "child-box";

            div.innerHTML = `
                <label>Gyerek neve *</label>
                <input type="text" class="child-name" value="${name}">

                <label>Életkor *</label>
                <input type="number" class="child-age" value="${age}">

                <label>Mikor távozik? *</label>
                <select class="child-leave">
                    <option value="Mise előtt" ${leave === "Mise előtt" ? "selected" : ""}>Mise előtt</option>
                    <option value="Mise után" ${leave === "Mise után" ? "selected" : ""}>Mise után</option>
                </select>

                <label>Allergiák és egyéb tudnivalók</label>
                <input type="text" class="child-note" value="${note}">

                <button type="button" class="delete-btn">Gyerek törlése</button>
            `;

            container.appendChild(div);
        }

        // 🔥 ESEMÉNYDELEGÁLÁS – EZ MINDIG MŰKÖDIK
        document.getElementById("children").addEventListener("click", function(e) {
            if (e.target.classList.contains("delete-btn")) {
                const box = e.target.parentNode;
                if (box) box.remove();
            }
        });

        function markError(input, condition) {
            if (condition) input.classList.add("error");
            else input.classList.remove("error");
            return condition;
        }

        function generateQRCodes() {
            qrList = [];
            currentIndex = 0;

            const parentLast = document.getElementById("parentLast");
            const parentFirst = document.getElementById("parentFirst");
            const parentEmail = document.getElementById("parentEmail");
            const phoneCountry = document.getElementById("phoneCountry");
            const phoneProvider = document.getElementById("phoneProvider");
            const phoneNumber = document.getElementById("phoneNumber");
            const city = document.getElementById("city");

            let hasError = false;

            hasError |= markError(parentLast, parentLast.value.trim() === "");
            hasError |= markError(parentFirst, parentFirst.value.trim() === "");
            hasError |= markError(parentEmail, parentEmail.value.trim() === "");
            hasError |= markError(phoneCountry, phoneCountry.value.trim() === "");
            hasError |= markError(phoneProvider, phoneProvider.value.trim() === "");
            hasError |= markError(phoneNumber, phoneNumber.value.trim() === "");
            hasError |= markError(city, city.value.trim() === "");

            if (hasError) return;

            const fullPhone = `${phoneCountry.value.trim()} ${phoneProvider.value.trim()} ${phoneNumber.value.trim()}`;
            const parentName = `${parentLast.value.trim()} ${parentFirst.value.trim()}`;

            const children = document.querySelectorAll(".child-box");

            children.forEach(child => {
                const nameInput = child.querySelector(".child-name");
                const ageInput = child.querySelector(".child-age");
                const leaveInput = child.querySelector(".child-leave");
                const noteInput = child.querySelector(".child-note");

                let childError = false;

                childError |= markError(nameInput, nameInput.value.trim() === "");
                childError |= markError(ageInput, ageInput.value.trim() === "");
                childError |= markError(leaveInput, leaveInput.value.trim() === "");

                if (childError) return;

                const data = `${parentName}|${fullPhone}|${nameInput.value.trim()}|${ageInput.value.trim()}|${leaveInput.value.trim()}|${noteInput.value.trim() || "nincs"}`;

                const qrUrl =
                    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
                    encodeURIComponent(data);

                qrList.push({ name: nameInput.value.trim(), url: qrUrl });
            });

            if (qrList.length === 0) return;

            document.getElementById("qrViewer").style.display = "block";
            showQR(0);
        }

        function showQR(index) {
            currentIndex = index;

            const qr = qrList[index];
            document.getElementById("qrContent").innerHTML = `
                <div class="name">${qr.name}</div>
                <img src="${qr.url}">
            `;

            document.getElementById("counter").innerText =
                `${index + 1} / ${qrList.length}`;
        }

        function prevQR() {
            if (currentIndex > 0) showQR(currentIndex - 1);
        }

        function nextQR() {
            if (currentIndex < qrList.length - 1) showQR(currentIndex + 1);
        }

        addChild();
    </script>

</body>

</html>
