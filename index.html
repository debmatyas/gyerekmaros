<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>QR kód generátor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .item {
            margin-bottom: 24px;
        }

        .name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        img {
            width: 200px;
            height: 200px;
        }

        .child-box {
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>Kísérő adatai</h2>

    <label>Név:</label><br>
    <input id="parentName" type="text" placeholder="Kísérő neve"><br><br>

    <label>Telefonszám:</label><br>
    <input id="parentPhone" type="text" placeholder="+36 30 1234567"><br><br>

    <label>Település:</label><br>
    <input id="city" type="text" placeholder="Település"><br><br>

    <h2>Gyerekek</h2>

    <div id="children"></div>

    <button onclick="addChild()">+ Gyerek hozzáadása</button>

    <br><br>
    <button onclick="generateQRCodes()">Elküld</button>

    <h2>QR kódok</h2>
    <div id="qrContainer"></div>

    <script>
        function addChild() {
            const container = document.getElementById("children");

            const div = document.createElement("div");
            div.className = "child-box";

            div.innerHTML = `
                <label>Gyerek neve:</label><br>
                <input type="text" class="child-name" placeholder="Név"><br><br>

                <label>Életkor:</label><br>
                <input type="number" class="child-age" placeholder="Életkor"><br><br>

                <label>Mikor távozik?</label><br>
                <select class="child-leave">
                    <option value="Mise előtt">Mise előtt</option>
                    <option value="Mise után">Mise után</option>
                </select><br><br>

                <label>Allergiák / megjegyzés:</label><br>
                <input type="text" class="child-note" placeholder="pl. méhcsípés"><br><br>

                <button onclick="this.parentElement.remove()">Gyerek törlése</button>
            `;

            container.appendChild(div);
        }

        function generateQRCodes() {
            const parentName = document.getElementById("parentName").value.trim();
            const parentPhone = document.getElementById("parentPhone").value.trim();
            const city = document.getElementById("city").value.trim();

            const qrContainer = document.getElementById("qrContainer");
            qrContainer.innerHTML = "";

            const children = document.querySelectorAll(".child-box");

            children.forEach(child => {
                const name = child.querySelector(".child-name").value.trim();
                const age = child.querySelector(".child-age").value.trim();
                const leave = child.querySelector(".child-leave").value.trim();
                const note = child.querySelector(".child-note").value.trim() || "nincs";

                const data = `${parentName}|${parentPhone}|${name}|${age}|${leave}|${note}`;

                const qrUrl =
                    "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
                    encodeURIComponent(data);

                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
                    <div class="name">${name}</div>
                    <img src="${qrUrl}" alt="QR kód">
                `;

                qrContainer.appendChild(div);
            });
        }
    </script>

</body>

</html>
